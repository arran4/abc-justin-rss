version: 2
project_name: abcjustinrss
builds:
  -
    id: "abcjustinrss"
    binary: "abcjustinrss"
    dir: cmd/abcjustinrss
    env:
      - CGO_ENABLED=0
  -
    id: "abcjustinrss-cgi"
    binary: "abcjustinrss-cgi"
    dir: cmd/abcjustinrss-cgi
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    flags: ["-tags=netgo", "-trimpath"]
archives:
  -
    id: default
    builds:
      - abcjustinrss
    format_overrides:
      - goos: windows
        formats: ["zip"]
  -
    id: cgi
    builds:
      - abcjustinrss-cgi
    name_template: '{{ .ProjectName }}-cgi_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: ["zip"]
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
nfpms:
  -
    vendor: Ubels Software Development
    homepage: https://github.com/arran4/
    maintainer: Arran Ubels <arran@ubels.com.au>
    description: NA
    license: GPL-3.0
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux
    release: 1
    section: default
    priority: extra
